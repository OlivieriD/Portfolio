spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://${AUTH0_DOMAIN}/
          audience: ${AUTH0_AUDIENCE}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    # Ensures Hibernate waits for schema.sql and data.sql to finish
    defer-datasource-initialization: true

  sql:
    init:
      # 'always' ensures your dummy data loads every time you start the container
      mode: always

# Logging for debugging (Optional but helpful during initial setup)
logging:
  level:
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG